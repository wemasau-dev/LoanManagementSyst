<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Management Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .loan-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .loan-card:hover {
            transform: translateX(5px);
        }
        
        .status-active {
            color: #27ae60;
            font-weight: bold;
        }
        
        .status-completed {
            color: #3498db;
            font-weight: bold;
        }
        
        .instalments-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .instalments-table th,
        .instalments-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        .instalments-table th {
            background: #f8f9fa;
            font-weight: bold;
        }
        
        .instalments-table tr.paid {
            background: #d4edda;
        }
        
        .payment-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Loan Management Portal</h1>
            <p>Apply for loans and manage your payments</p>
        </div>
        
        <div class="content">
            <div id="alert" style="display:none;"></div>
            
            <div class="form-group">
                <label>Loan Amount ($)</label>
                <input type="number" id="loanAmount" placeholder="Enter amount (max 3,000,000)">
            </div>
            
            <div class="form-group">
                <label>Start Date</label>
                <input type="date" id="startDate">
            </div>
            
            <button onclick="createLoan()">Apply for Loan</button>
            <button onclick="refreshLoans()">Refresh Loans</button>
            
            <hr style="margin: 30px 0;">
            
            <h2>Your Loans</h2>
            <div id="loansList"></div>
            
            <div id="loanDetails"></div>
        </div>
    </div>
    
 <script>
    // ============ YOUR GOOGLE SCRIPT URL ============
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxW0t491SQGmhnK0d169xgRmCLgV1dZPd7w12fMsRIUHZ8pwBkAdoFOJJnMMgojIZID/exec';
    
    // ============ LOAN PORTAL CLASS ============
    class LoanPortal {
        constructor(apiUrl) {
            this.apiUrl = apiUrl;
            console.log('Loan portal initialized');
        }
        
        async getLoans() {
            const response = await fetch(`${this.apiUrl}?action=getLoans`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        }
        
        async getLoan(loanId) {
            const response = await fetch(`${this.apiUrl}?action=getLoan&id=${loanId}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        }
        
        async createLoan(amount, startDate) {
            const response = await fetch(this.apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'createLoan',
                    amount: parseFloat(amount),
                    startDate: startDate
                })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        }
        
        async makePayment(loanId, amount, paymentDate) {
            const response = await fetch(this.apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'makePayment',
                    loanId: loanId,
                    amount: parseFloat(amount),
                    paymentDate: paymentDate
                })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        }
    }
    
    // Initialize portal
    const portal = new LoanPortal(GOOGLE_SCRIPT_URL);
    
    // Test connection function
    async function testConnection() {
        try {
            console.log('Testing connection to:', GOOGLE_SCRIPT_URL);
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getLoans`);
            console.log('Response status:', response.status);
            
            if (response.ok) {
                const data = await response.json();
                console.log('Connection successful!', data);
                showAlert('✅ Connected to Google Sheets successfully!', 'success');
            } else {
                console.error('Connection failed:', response.status);
                showAlert(`❌ Connection failed: ${response.status}. Check CORS and deployment settings.`, 'error');
            }
        } catch (error) {
            console.error('Connection error:', error);
            showAlert(`❌ Error: ${error.message}`, 'error');
        }
    }
    
    // UI Functions
    async function createLoan() {
        const amount = document.getElementById('loanAmount').value;
        const startDate = document.getElementById('startDate').value;
        
        if (!amount || amount > 3000000) {
            showAlert('Please enter a valid amount (max 3,000,000)', 'error');
            return;
        }
        
        try {
            const result = await portal.createLoan(amount, startDate);
            showAlert('✅ Loan created! ID: ' + result.loanId, 'success');
            document.getElementById('loanAmount').value = '';
            await refreshLoans();
        } catch (error) {
            showAlert('❌ Error: ' + error.message, 'error');
        }
    }
    
    async function refreshLoans() {
        try {
            const loans = await portal.getLoans();
            const container = document.getElementById('loansList');
            
            if (!loans || loans.length === 0) {
                container.innerHTML = '<p>No loans found.</p>';
                return;
            }
            
            container.innerHTML = loans.map(loan => `
                <div class="loan-card" onclick="viewLoan('${loan.id}')">
                    <strong>Loan #${loan.id}</strong><br>
                    Amount: $${parseFloat(loan.amount).toLocaleString()}<br>
                    Status: <span class="status-${loan.status}">${loan.status}</span>
                </div>
            `).join('');
        } catch (error) {
            showAlert('❌ Error loading loans: ' + error.message, 'error');
        }
    }
    
    async function viewLoan(loanId) {
        try {
            const loan = await portal.getLoan(loanId);
            const container = document.getElementById('loanDetails');
            
            container.innerHTML = `
                <h3>Loan #${loan.id}</h3>
                <p>Amount: $${parseFloat(loan.amount).toLocaleString()}</p>
                <p>Total Payable: $${parseFloat(loan.totalPayable).toLocaleString()}</p>
                <p>Status: ${loan.status}</p>
                <button onclick="makePayment('${loan.id}')">Make Payment</button>
            `;
        } catch (error) {
            showAlert('❌ Error: ' + error.message, 'error');
        }
    }
    
    async function makePayment(loanId) {
        const amount = prompt('Enter payment amount:');
        if (!amount) return;
        
        try {
            const result = await portal.makePayment(loanId, amount, new Date().toISOString());
            showAlert('✅ Payment successful!', 'success');
            await refreshLoans();
            await viewLoan(loanId);
        } catch (error) {
            showAlert('❌ Error: ' + error.message, 'error');
        }
    }
    
    function showAlert(message, type) {
        const alertDiv = document.getElementById('alert');
        alertDiv.className = `alert alert-${type}`;
        alertDiv.innerHTML = message;
        alertDiv.style.display = 'block';
        setTimeout(() => {
            alertDiv.style.display = 'none';
        }, 5000);
    }
    
    // Initialize on page load
    window.addEventListener('load', () => {
        testConnection();
        refreshLoans();
    });
</script>
